<div class="container">
  <div *ngIf="album">
    <h2>Album Detail</h2>

    <p>ID: {{ album.id }}</p>
    <p>User ID: {{ album.userId }}</p>

    <input [(ngModel)]="album.title">
    <button (click)="save()" class="save-btn">Save</button>

    <br><br>

    <button [routerLink]="['/albums', album.id, 'photos']">
      View Photos
    </button>

    <button (click)="back()" class="secondary-btn">Back</button>
  </div>
</div>
