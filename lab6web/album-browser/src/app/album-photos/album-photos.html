<div class="container">
  <h2>Photos</h2>

  <p *ngIf="loading">Loading...</p>

  <div class="grid" *ngIf="!loading">
    <div class="photo-card" *ngFor="let photo of photos">
      <img [src]="'https://picsum.photos/150?random=' + photo.id" alt="photo">
      <p>{{ photo.title }}</p>
    </div>
  </div>

  <button (click)="back()">Back</button>
</div>
