<div class="card">
  <img class="main-image" [src]="selectedImage" alt="{{ product().name }}">

  <div class="thumbnails">
    <img *ngFor="let img of product().images"
         [src]="img"
         (click)="selectImage(img)">
  </div>

  <h3>{{ product().name }}</h3>
  <p>{{ product().description }}</p>

  <div class="price">{{ product().price | number }} ₸</div>

  <div class="rating">
    <span *ngFor="let isFull of getStars()">
      {{ isFull ? '★' : '☆' }}
    </span>
    <span class="rating-value" *ngIf="product().rating">
      {{ product().rating }}
    </span>
  </div>

  <div class="likes"><i class="fa fa-heart"></i> {{ product().likes }}</div>

  <a [href]="product().link" target="_blank" class="view-btn">
    View on Kaspi
  </a>

  <div class="share-buttons">
    <button (click)="shareWhatsApp()">WhatsApp</button>
    <button (click)="shareTelegram()">Telegram</button>
  </div>

  <div class="actions">
    <button class="action-btn like-btn" (click)="likeProduct()">
      <i class="fa fa-heart"></i>
    </button>
    <button class="action-btn delete-btn" (click)="deleteProduct()">
      <i class="fa fa-trash"></i>
    </button>
  </div>
</div>
