<div class="categories">
  <button *ngFor="let category of categories"
          (click)="selectCategory(category)"
          [class.active]="selectedCategory()?.id === category.id">
    {{ category.name }}
  </button>
</div>


<app-product-list 
  [products]="products()" 
  (deleteProduct)="handleDelete($event)">
</app-product-list>
